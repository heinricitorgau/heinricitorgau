name: Metrics

on:
  schedule:
    - cron: "0 * * * *" # Every hour (UTC)
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/metrics.yml"

concurrency:
  group: metrics
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub metrics (clean engineer dashboard)
        uses: lowlighter/metrics@v3.34
        with:
          # Use the built-in token (safe default)
          token: ${{ secrets.GITHUB_TOKEN }}

          # Explicit user for deterministic output
          user: heinricitorgau

          # If any plugin fails, fail the workflow (do NOT commit a broken/incorrect SVG)
          plugins_errors_fatal: yes

          # Output
          filename: github-metrics.svg

          # Terminal look (Ubuntu-like)
          template: terminal
          config_timezone: Asia/Taipei
          config_display: large
          # Extra margins to prevent GitHub README clipping
          config_padding: 24%, 18%

          # Keep it minimal and signal-focused
          base: header, activity, community

          # Self-introduction (pulls from your GitHub profile bio)
          plugin_introduction: yes
          plugin_introduction_title: About me

          # Stable, high-signal modules
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_lines: yes

          # --- Disabled (intentionally) ---
          # These are commonly noisy, permission-sensitive, or error-prone in profiles.
          # plugin_habits: yes
          # plugin_traffic: yes
          # plugin_achievements: yes
          # plugin_topics: yes
          # plugin_stars: yes
          # plugin_followup: yes

          # Commit the generated SVG back to the repo
          output_action: commit
          committer_message: "chore: update github metrics dashboard"
