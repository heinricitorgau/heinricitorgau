name: Dashboard

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dashboard.svg
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html

          profile_lines = Path("profile.txt").read_text(encoding="utf-8").splitlines()

          lines = []
          lines.append("heinricitorgau@testdeMacBook-Air:~$ cat profile.txt")
          lines.append("")
          lines.extend(profile_lines)
          lines.append("")
          lines.append("heinricitorgau@testdeMacBook-Air:~$ system status")
          lines.append("dashboard_mode ........ engineer_terminal")
          lines.append("input_source .......... profile.txt")
          lines.append("render_target ......... dashboard.svg")
          lines.append("pipeline_state ........ stable")

          width = 1220
          padding_x = 48
          top_y = 84
          line_h = 30
          font_size = 18
          card_radius = 20

          content_height = len(lines) * line_h
          height = top_y + content_height + 70

          svg_lines = []
          y = top_y + 16

          for line in lines:
              safe = html.escape(line)
              css_class = "prompt" if line.startswith("heinricitorgau@testdeMacBook-Air") else "line"
              if line == "":
                  y += line_h
                  continue
              svg_lines.append(
                  f'<text x="{padding_x}" y="{y}" class="{css_class}">{safe}</text>'
              )
              y += line_h

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}" role="img" aria-label="Engineer dashboard">
            <style>
              .bg {{ fill: #0d1117; }}
              .card {{ fill: #300a24; stroke: #4a2140; stroke-width: 1; }}
              .title {{ fill: #f6f5f4; font: 700 18px ui-monospace, 'Ubuntu Mono', Menlo, Consolas, monospace; }}
              .path {{ fill: #c0b7bc; font: 500 14px ui-monospace, 'Ubuntu Mono', Menlo, Consolas, monospace; }}
              .prompt {{ fill: #8ae234; font: {font_size}px ui-monospace, 'Ubuntu Mono', Menlo, Consolas, monospace; white-space: pre; }}
              .line {{ fill: #eeeeec; font: {font_size}px ui-monospace, 'Ubuntu Mono', Menlo, Consolas, monospace; white-space: pre; }}
              .dot-red {{ fill: #ff6159; }}
              .dot-yellow {{ fill: #ffbd2e; }}
              .dot-green {{ fill: #28c840; }}
              .divider {{ stroke: #4a2140; stroke-width: 1; }}
            </style>
            <rect class="bg" x="0" y="0" width="{width}" height="{height}" rx="0" ry="0"/>
            <rect class="card" x="24" y="20" width="{width - 48}" height="{height - 40}" rx="{card_radius}" ry="{card_radius}"/>
            <circle class="dot-red" cx="52" cy="41" r="6"/>
            <circle class="dot-yellow" cx="74" cy="41" r="6"/>
            <circle class="dot-green" cx="96" cy="41" r="6"/>
            <text x="130" y="36" class="path">heinricitorgau@testdeMacBook-Air: ~/profile.txt</text>
            <text x="130" y="54" class="title">Terminal</text>
            <line x1="24" y1="66" x2="{width - 24}" y2="66" class="divider"/>
            {''.join(svg_lines)}
          </svg>'''

          Path("dashboard.svg").write_text(svg, encoding="utf-8")
          PY

      - name: Commit dashboard if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.svg

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update dashboard"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
