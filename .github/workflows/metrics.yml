name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 00:00 跑一次
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write         # 允許把生成的 SVG commit 回 repo

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          # 輸出檔名（會 commit 回 repo 根目錄）
          filename: github-metrics.svg

          # 風格（你目前用 algolia，我這邊選 dark+clean；你要完全一致我也能幫你調）
          template: terminal

          # F1 telemetry HUD tuning
          config_display: large
          config_timezone: Asia/Taipei
          config_padding: 12%
          config_order: base.header, base.activity, languages, streak, lines, isocalendar, traffic, achievements, habits

          # Telemetry-style minimal dashboard
          base: header, activity

          # Languages telemetry
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 6

          # Coding intensity (season heatmap)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Pit-wall habits (weekly pace)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Commit streak + performance metrics
          plugin_streak: yes
          plugin_streak_sections: current, longest

          # Lines of code radar
          plugin_lines: yes

          # Repository traffic telemetry
          plugin_traffic: yes

          # Achievements (race badges)
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: compact

          # 直接 commit 結果回 repo（不靠外部服務）
          output_action: commit
          committer_message: "chore: update metrics"
