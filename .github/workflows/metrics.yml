name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # run daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          filename: github-metrics.svg

          # Base sections (header will show your GitHub profile bio as the introduction)
          base: header, activity, community, repositories

          # Self‑introduction block (renders profile introduction directly in the dashboard)
          plugin_introduction: yes
          plugin_introduction_title: About me

          # Language distribution
          plugin_languages: yes

          # Contribution calendar
          plugin_isocalendar: yes

          # (Disabled for reliability) Work habits
          # plugin_habits: yes

          # (Optional) Code line statistics
          plugin_lines: yes

          # (Disabled for reliability) Repository traffic
          # plugin_traffic: yes

          # (Disabled for reliability) Achievements
          # plugin_achievements: yes

          output_action: commit
          committer_message: "chore: update github metrics dashboard"
