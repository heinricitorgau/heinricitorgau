name: Dashboard

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dashboard.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.repository_owner }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os, json, urllib.request, html

          username = os.environ["GITHUB_ACTOR"]
          token = os.environ["GITHUB_TOKEN"]

          def fetch(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "User-Agent": username,
                      "Accept": "application/vnd.github+json",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          user = fetch(f"https://api.github.com/users/{username}")

          profile = Path("profile.txt").read_text().splitlines()

          repos = user.get("public_repos", 0)
          followers = user.get("followers", 0)

          lines = []
          lines.append(f"{username}@github:~$ whoami")
          lines.extend(profile)
          lines.append("")
          lines.append(f"repos: {repos}   followers: {followers}")

          y = 40
          line_h = 26
          svg_lines = []

          for line in lines:
              svg_lines.append(f'<text x="40" y="{y}" fill="#c9d1d9" font-family="monospace" font-size="18">{html.escape(line)}</text>')
              y += line_h

          height = y + 40

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="900" height="{height}">
          <rect width="100%" height="100%" fill="#0d1117" />
          {''.join(svg_lines)}
          </svg>'''

          Path("dashboard.svg").write_text(svg)
          PY

      - name: Commit dashboard if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.svg

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update dashboard"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
