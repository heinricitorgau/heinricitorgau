name: Dashboard

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dashboard.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.repository_owner }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html

          # Read profile.txt only
          profile_lines = Path("profile.txt").read_text(encoding="utf-8").splitlines()

          # Prepare SVG text lines
          lines = []
          lines.append("profile.txt")
          lines.append("--------------------")
          lines.extend(profile_lines)

          # Layout settings
          y = 40
          line_h = 26
          svg_lines = []

          for line in lines:
              svg_lines.append(f'<text x="40" y="{y}" fill="#c9d1d9" font-family="monospace" font-size="18">{html.escape(line)}</text>')
              y += line_h

          height = y + 40

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="900" height="{height}">
          <rect width="100%" height="100%" fill="#0d1117" />
          {''.join(svg_lines)}
          </svg>'''

          Path("dashboard.svg").write_text(svg, encoding="utf-8")
          PY

      - name: Commit dashboard if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.svg

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update dashboard"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
