name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 00:00 跑一次
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write         # 允許把生成的 SVG commit 回 repo

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          # 輸出檔名（會 commit 回 repo 根目錄）
          filename: github-metrics.svg

          # 風格（你目前用 algolia，我這邊選 dark+clean；你要完全一致我也能幫你調）
          template: classic

          # 顯示內容（可依你喜好增減）
          base: header, activity
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_wakatime: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 直接 commit 結果回 repo（不靠外部服務）
          output_action: commit
          committer_message: "chore: update metrics"
