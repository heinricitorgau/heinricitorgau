name: Dashboard

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate dashboard.svg
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import html

          profile_lines = Path("profile.txt").read_text(encoding="utf-8").splitlines()

          lines = []
          lines.append("heinricitorgau@ubuntu:~$ cat profile.txt")
          lines.append("")
          lines.extend(profile_lines)
          lines.append("")
          lines.append("heinricitorgau@ubuntu:~$ ")

          width = 1180
          padding_x = 40
          top_y = 84
          line_h = 23
          font_size = 14
          card_radius = 8
          titlebar_h = 32

          content_height = len(lines) * line_h
          height = top_y + content_height + 28

          svg_lines = []
          y = top_y - 2

          for line in lines:
              safe = html.escape(line)
              if line == "":
                  y += line_h
                  continue
              if line == "heinricitorgau@ubuntu:~$ ":
                  svg_lines.append(
                      f'<text x="{padding_x}" y="{y}" class="prompt-user">heinricitorgau@ubuntu</text>'
                      f'<text x="{padding_x + 169}" y="{y}" class="prompt-path">:~</text>'
                      f'<text x="{padding_x + 188}" y="{y}" class="prompt-symbol">$</text>'
                      f'<rect x="{padding_x + 201}" y="{y - 11}" width="8" height="14" class="cursor-block"/>'
                  )
              elif line.startswith("heinricitorgau@ubuntu:~$"):
                  command = safe.split("$ ", 1)[1] if "$ " in safe else ""
                  svg_lines.append(
                      f'<text x="{padding_x}" y="{y}" class="prompt-user">heinricitorgau@ubuntu</text>'
                      f'<text x="{padding_x + 169}" y="{y}" class="prompt-path">:~</text>'
                      f'<text x="{padding_x + 188}" y="{y}" class="prompt-symbol">$</text>'
                      f'<text x="{padding_x + 201}" y="{y}" class="prompt-cmd">{command}</text>'
                  )
              else:
                  svg_lines.append(f'<text x="{padding_x}" y="{y}" class="line">{safe}</text>')
              y += line_h

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}" role="img" aria-label="Engineer dashboard">
            <style>
              .bg {{ fill: #0d1117; }}
              .card {{ fill: #300a24; stroke: #2b0b22; stroke-width: 1; }}
              .titlebar {{ fill: #3a0f2d; }}
              .title {{ fill: #f2f2f2; font: 500 12px 'Ubuntu', 'Ubuntu Sans', Arial, sans-serif; }}
              .line {{ fill: #eeeeec; font: {font_size}px 'Ubuntu Mono', 'DejaVu Sans Mono', monospace; white-space: pre; }}
              .prompt-user {{ fill: #8ae234; font: {font_size}px 'Ubuntu Mono', 'DejaVu Sans Mono', monospace; white-space: pre; }}
              .prompt-path {{ fill: #729fcf; font: {font_size}px 'Ubuntu Mono', 'DejaVu Sans Mono', monospace; white-space: pre; }}
              .prompt-symbol {{ fill: #eeeeec; font: {font_size}px 'Ubuntu Mono', 'DejaVu Sans Mono', monospace; white-space: pre; }}
              .prompt-cmd {{ fill: #eeeeec; font: {font_size}px 'Ubuntu Mono', 'DejaVu Sans Mono', monospace; white-space: pre; }}
              .cursor-block {{ fill: #eeeeec; }}
              .win-btn {{ fill: #5e3a52; }}
              .divider {{ stroke: #2b0b22; stroke-width: 1; }}
            </style>
            <rect class="bg" x="0" y="0" width="{width}" height="{height}" rx="0" ry="0"/>
            <rect class="card" x="28" y="20" width="{width - 56}" height="{height - 40}" rx="{card_radius}" ry="{card_radius}"/>
            <rect class="titlebar" x="28" y="20" width="{width - 56}" height="{titlebar_h}" rx="{card_radius}" ry="{card_radius}"/>
            <rect x="28" y="20" width="{width - 56}" height="{titlebar_h}" fill="none" stroke="#2b0b22" stroke-width="1" rx="{card_radius}" ry="{card_radius}"/>
            <circle class="win-btn" cx="52" cy="36" r="3.2"/>
            <circle class="win-btn" cx="64" cy="36" r="3.2"/>
            <circle class="win-btn" cx="76" cy="36" r="3.2"/>
            <text x="{width / 2}" y="39" class="title" text-anchor="middle">heinricitorgau@ubuntu: ~</text>
            <line x1="28" y1="52" x2="{width - 28}" y2="52" class="divider"/>
            {''.join(svg_lines)}
          </svg>'''

          Path("dashboard.svg").write_text(svg, encoding="utf-8")
          PY

      - name: Commit dashboard if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.svg

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "update dashboard"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
