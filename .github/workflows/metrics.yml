name: Metrics

on:
  schedule:
    - cron: "30 * * * *" # Every hour (UTC)
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/metrics.yml"

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate GitHub metrics (minimal engineer dashboard)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: heinricitorgau
          plugins_errors_fatal: yes

          filename: github-metrics.svg

          # Minimal terminal look
          template: terminal
          config_timezone: Asia/Taipei
          config_display: large
          config_padding: 18%, 14%

          # Only keep one core signal: activity
          base: activity, repositories

          # Show a small, representative repository section
          plugin_repositories: yes
          plugin_repositories_featured: heinricitorgau/heinricitorgau,heinricitorgau/Automated-University-Admission-Requirements-Analyzer,heinricitorgau/Offense-to-Defense-A-Kali-Linux-Guide-to-Reverse-Shell-and-Backdoors
          plugin_repositories_order: featured, pinned
          plugin_repositories_pinned: 2

          # No extra plugins for maximum reliability and minimalism
          # plugin_isocalendar: yes
          # plugin_languages: yes
          # plugin_lines: yes
          # plugin_habits: yes
          # plugin_traffic: yes
          # plugin_achievements: yes

          output_action: commit
          committer_message: "chore: update minimal metrics dashboard"
