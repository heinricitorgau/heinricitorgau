name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 00:00 跑一次
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write         # 允許把生成的 SVG commit 回 repo

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          # 輸出檔名（會 commit 回 repo 根目錄）
          filename: github-metrics.svg

          # 風格（你目前用 algolia，我這邊選 dark+clean；你要完全一致我也能幫你調）
          template: terminal

          # Telemetry-style minimal dashboard
          base: header, activity

          # Languages telemetry
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 6

          # Coding intensity (heatmap telemetry)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Commit streak + performance metrics
          plugin_streak: yes
          plugin_streak_sections: current, longest

          # Lines of code radar
          plugin_lines: yes

          # Repository traffic telemetry
          plugin_traffic: yes

          # Achievements (like race badges)
          plugin_achievements: yes
          plugin_achievements_threshold: C

          # 直接 commit 結果回 repo（不靠外部服務）
          output_action: commit
          committer_message: "chore: update metrics"
